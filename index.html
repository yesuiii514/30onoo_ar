<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebAR Lab – 3D Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6ff7;
      --accent2: #4fd1a8;
      --text: #f0eff8;
      --muted: rgba(240,239,248,0.45);
      --pill-bg: rgba(124,111,247,0.14);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--pill-bg);
      color: var(--accent);
      border: 1px solid rgba(124,111,247,0.25);
      letter-spacing: 0.3px;
    }

    .badge.green {
      background: rgba(79,209,168,0.12);
      color: var(--accent2);
      border-color: rgba(79,209,168,0.25);
    }

    /* ── Viewer Wrapper ── */
    .viewer-wrap {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    model-viewer {
      width: 100%;
      flex: 1;
      background-color: transparent;
      --poster-color: transparent;
    }

    /* ── Floating Overlay UI ── */
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
    }

    /* Hint pill top-left */
    .hint-pill {
      pointer-events: none;
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 99px;
      background: rgba(13,13,15,0.72);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      font-size: 12px;
      color: var(--muted);
      animation: fadeInDown 0.6s ease 0.4s both;
    }

    .hint-pill svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
      flex-shrink: 0;
    }

    /* Bottom action bar */
    .bottom-bar {
      pointer-events: auto;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeInUp 0.6s ease 0.5s both;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(13,13,15,0.82);
      backdrop-filter: blur(12px);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(124,111,247,0.18);
      border-color: rgba(124,111,247,0.4);
      transform: translateY(-1px);
    }

    .btn:active { transform: scale(0.97); }

    .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }

    .btn.primary:hover {
      background: #6a5ee8;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Info strip top-right */
    .model-info {
      pointer-events: none;
      align-self: flex-end;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .info-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 10px;
      background: rgba(13,13,15,0.72);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      font-size: 12px;
      color: var(--muted);
    }

    .info-card strong {
      color: var(--text);
      font-weight: 500;
      font-size: 13px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      animation: pulse 2s infinite;
    }

    /* ── Animations ── */
    @keyframes fadeInDown {
      from { opacity:0; transform: translateY(-8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.35; }
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      .btn span { display: none; }
      .btn { padding: 10px 14px; }
      .model-info { display: none; }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <div class="logo-icon">
        <!-- cube icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="logo-text">WebAR<span>Lab</span></span>
    </div>

    <div class="header-right">
      <span class="badge green">● AR Ready</span>
      <span class="badge">3D Viewer</span>
    </div>
  </header>

  <div class="viewer-wrap">
    <model-viewer
      src="./cute_creature.glb"
      alt="3D model in AR"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      ar-scale="fixed"
      scale="0.3 0.3 0.3"
      camera-controls
      auto-rotate
      shadow-intensity="0.8"
      exposure="1"
      environment-image="neutral"
      loading="eager"
      reveal="auto"
    ></model-viewer>

    <div class="overlay">

      <!-- Top row -->
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div class="hint-pill">
          <!-- rotate icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/>
          </svg>
          Эргүүлж, томруулж үзэх боломжтой
        </div>

        <div class="model-info">
          <div class="info-card">
            <div class="dot"></div>
            <strong>cute_creature.glb</strong>
          </div>
          <div class="info-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13">
              <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
            </svg>
            WebXR · Scene Viewer · Quick Look
          </div>
        </div>
      </div>

      <!-- Bottom action bar -->
      <div class="bottom-bar">
        <button class="btn" onclick="document.querySelector('model-viewer').resetTurntableRotation()">
          <!-- reset -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          <span>Дахин тохируулах</span>
        </button>

        <button class="btn primary" onclick="document.querySelector('model-viewer').activateAR()">
          <!-- AR / camera icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>AR-д харах</span>
        </button>

        <button class="btn" onclick="(function(){var mv=document.querySelector('model-viewer');mv.autoRotate=!mv.autoRotate;}())">
          <!-- play/pause -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
          </svg>
          <span>Эргэлт</span>
        </button>
      </div>

    </div>
  </div>

</body>
</html>
